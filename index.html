<!DOCTYPE html>
<html lang="vi">
<head>

</head>

<body>

<h1>AI Product Description Generator</h1>

<div class="container">

<label>Lợi ích cho khách hàng</label>

<button onclick="generate()">Tạo mô tả</button>

<div id="result"></div>

<button onclick="copyText()">Copy</button>

</div>
